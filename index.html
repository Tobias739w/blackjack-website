<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blackjack Casino</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🃏 Blackjack Casino</h1>

<div class="hud">
💰 Konto: <span id="money">1000</span>$
<br>
🎲 Einsatz: <span id="bet">0</span>$
</div>

<div class="chips">
<button onclick="addBet(10)">🟡 10</button>
<button onclick="addBet(50)">🔵 50</button>
<button onclick="addBet(100)">🔴 100</button>
<button onclick="clearBet()">Reset</button>
</div>

<div class="table">

<div class="area">
<h2>Dealer</h2>
<div id="dealerCards" class="cards"></div>
<p id="dealerSum"></p>
</div>

<div class="area">
<h2>Spieler</h2>
<div id="playerCards" class="cards"></div>
<p id="playerSum"></p>
</div>

</div>

<h2 id="result"></h2>

<div class="buttons">
<button onclick="startGame()">Deal</button>
<button onclick="hit()">Hit</button>
<button onclick="stand()">Stand</button>
<button onclick="newRound()">Neue Runde</button>
</div>

<script src="script.js"></script>

</body>
</html>
