<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<title>Blackjack Casino</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🃏 Blackjack Casino</h1>

<h2>💰 Geld: <span id="money">1000</span>$</h2>
<h3>🎲 Einsatz: <span id="bet">100</span>$</h3>

<div class="table">

<div>
<h2>Dealer</h2>
<div id="dealerCards" class="cards"></div>
<p id="dealerSum"></p>
</div>

<div>
<h2>Spieler</h2>
<div id="playerCards" class="cards"></div>
<p id="playerSum"></p>
</div>

</div>

<h2 id="result"></h2>

<div class="buttons">
<button onclick="startGame()">Start</button>
<button onclick="hit()">Hit</button>
<button onclick="stand()">Stand</button>
<button onclick="newRound()">Neue Runde</button>
</div>

<script src="script.js"></script>

</body>
</html>
